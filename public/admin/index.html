<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
</head>
<body>
  <script>
    window.CMS_MANUAL_INIT = true
  </script>
  <script src="https://unpkg.com/decap-cms@3.1.10/dist/decap-cms.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'dungchi1681-web/dc-dalat-family',
            branch: 'main',
            auth_type: 'implicit'
          },
          media_folder: 'public/img',
          public_folder: '/img',
          collections: [
            {
              name: 'blog',
              label: 'Blog',
              folder: 'content/blog',
              create: true,
              slug: '{{slug}}',
              fields: [
                {label: 'Title', name: 'title', widget: 'string'},
                {label: 'Ngày đăng', name: 'date', widget: 'datetime'},
                {label: 'Ảnh bìa', name: 'thumbnail', widget: 'image'},
                {label: 'Mô tả', name: 'description', widget: 'text'},
                {label: 'Body', name: 'body', widget: 'markdown'}
              ]
            }
          ]
        }
      });
    });
  </script>
</body>
</html>
